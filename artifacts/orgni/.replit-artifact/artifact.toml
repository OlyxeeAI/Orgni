kind = "web"
previewPath = "/"
title = "Orgni"
version = "1.0.0"
id = "artifacts/orgni"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24137

[services.development]
run = "pnpm --filter @workspace/orgni run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orgni", "run", "build" ]
publicDir = "artifacts/orgni/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24137"
BASE_PATH = "/"
