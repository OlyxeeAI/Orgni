kind = "web"
previewPath = "/app/"
title = "Orgni App"
version = "1.0.0"
id = "artifacts/orgni-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/app/" ]
localPort = 18245

[services.development]
run = "pnpm --filter @workspace/orgni-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orgni-app", "run", "build" ]
publicDir = "artifacts/orgni-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18245"
BASE_PATH = "/app/"
