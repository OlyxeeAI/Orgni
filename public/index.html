<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orgni — Organizational Intelligence</title>
<style>
/* ── Tokens ────────────────────────────────────────────────────────── */
:root {
  --ink:       #0f0f0f;
  --ink-2:     #3a3a3a;
  --ink-3:     #7a7a7a;
  --rule:      #e4e4e4;
  --surface:   #f8f8f7;
  --white:     #ffffff;
  --signal:    #1a6b3c;
  --signal-bg: #eaf4ee;
  --warn:      #7a4a00;
  --warn-bg:   #fef6e4;
  --danger:    #8b1a1a;
  --danger-bg: #fdeaea;
  --accent:    #1a3a6b;
  --accent-bg: #eaeefd;
  --radius:    6px;
  --font-ui:   'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Mono', monospace;
}

/* ── Reset ─────────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { font-family: var(--font-ui); background: var(--surface); color: var(--ink); min-height: 100vh; }
button { cursor: pointer; font-family: inherit; }
input, textarea, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }

/* ── Layout ────────────────────────────────────────────────────────── */
.app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

/* ── Sidebar ───────────────────────────────────────────────────────── */
.sidebar {
  background: var(--ink);
  color: var(--white);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  width: 220px;
  height: 100vh;
  overflow-y: auto;
  z-index: 10;
}
.sidebar-logo {
  padding: 22px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-logo .wordmark {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -.3px;
  color: var(--white);
}
.sidebar-logo .tagline {
  font-size: 11px;
  color: rgba(255,255,255,.45);
  margin-top: 2px;
  letter-spacing: .3px;
  text-transform: uppercase;
}
.org-switcher {
  padding: 12px 12px 8px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.org-select {
  width: 100%;
  padding: 7px 10px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--radius);
  color: var(--white);
  font-size: 13px;
  appearance: none;
}
.org-select option { background: #1a1a1a; }
.btn-new-org {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  background: transparent;
  border: 1px dashed rgba(255,255,255,.2);
  border-radius: var(--radius);
  color: rgba(255,255,255,.5);
  font-size: 12px;
  transition: all .15s;
}
.btn-new-org:hover { border-color: rgba(255,255,255,.4); color: rgba(255,255,255,.8); }
.nav { padding: 8px 0; flex: 1; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 20px;
  font-size: 13px;
  color: rgba(255,255,255,.55);
  cursor: pointer;
  transition: all .12s;
  border-left: 2px solid transparent;
}
.nav-item:hover { color: rgba(255,255,255,.85); background: rgba(255,255,255,.05); }
.nav-item.active { color: var(--white); border-left-color: #5a9fff; background: rgba(255,255,255,.07); }
.nav-icon { font-size: 15px; width: 18px; text-align: center; }
.nav-section {
  padding: 14px 20px 4px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: rgba(255,255,255,.25);
}
.knowledge-badge {
  margin: 0 12px 12px;
  padding: 8px 10px;
  background: rgba(255,255,255,.06);
  border-radius: var(--radius);
  font-size: 11px;
  color: rgba(255,255,255,.5);
}
.knowledge-badge .kb-status {
  font-weight: 600;
  font-size: 12px;
  color: var(--white);
  margin-bottom: 3px;
}
.kb-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
.kb-dot.empty { background: #666; }
.kb-dot.partial { background: #d4a017; }
.kb-dot.ready { background: #3ecf8e; }

/* ── Main ──────────────────────────────────────────────────────────── */
.main { margin-left: 220px; padding: 32px; max-width: 1000px; }

/* ── Page header ───────────────────────────────────────────────────── */
.page-header { margin-bottom: 28px; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
.page-sub { font-size: 13.5px; color: var(--ink-3); margin-top: 4px; }

/* ── Cards ─────────────────────────────────────────────────────────── */
.card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 22px 24px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--ink-3);
  margin-bottom: 14px;
}
.card-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── Stat row ──────────────────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; }
.stat-box { background: var(--surface); border-radius: 8px; padding: 14px 16px; }
.stat-num { font-size: 26px; font-weight: 700; color: var(--ink); }
.stat-label { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; }

/* ── Buttons ───────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; border: none;
  transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(--ink); color: var(--white); }
.btn-primary:hover { background: #2a2a2a; }
.btn-primary:disabled { background: var(--ink-3); cursor: not-allowed; }
.btn-secondary { background: var(--surface); color: var(--ink); border: 1px solid var(--rule); }
.btn-secondary:hover { background: #efefee; }
.btn-ghost { background: transparent; color: var(--ink-2); padding: 6px 10px; font-size: 12px; }
.btn-ghost:hover { background: var(--surface); }
.btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #f5c0c0; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── Form ──────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12.5px; font-weight: 500; color: var(--ink-2); display: block; margin-bottom: 5px; }
.form-hint { font-size: 11.5px; color: var(--ink-3); margin-top: 3px; }
.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 8px 11px;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  font-size: 13.5px;
  background: var(--white);
  color: var(--ink);
  transition: border .12s;
}
.form-input:focus, .form-textarea:focus { outline: none; border-color: #999; }
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
.tag-input-wrap {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 6px 8px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  background: var(--white); min-height: 40px; align-items: center; cursor: text;
}
.tag-input-wrap input {
  border: none; outline: none; font-size: 13px; flex: 1; min-width: 100px; padding: 2px 4px;
}
.tag { background: var(--surface); border: 1px solid var(--rule); border-radius: 4px; padding: 2px 8px 2px 6px; font-size: 12px; color: var(--ink-2); display: flex; align-items: center; gap: 4px; }
.tag-remove { background: none; border: none; color: var(--ink-3); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
.tag-remove:hover { color: var(--danger); }

/* ── Upload zone ───────────────────────────────────────────────────── */
.upload-zone {
  border: 2px dashed var(--rule);
  border-radius: 10px;
  padding: 32px 24px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-label { font-size: 14px; font-weight: 500; }
.upload-sub { font-size: 12px; color: var(--ink-3); margin-top: 4px; }

/* ── Doc list ──────────────────────────────────────────────────────── */
.doc-list { display: flex; flex-direction: column; gap: 8px; }
.doc-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: var(--surface); border-radius: 8px;
  font-size: 13px;
}
.doc-icon { font-size: 18px; }
.doc-info { flex: 1; min-width: 0; }
.doc-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-meta { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }
.status-pill {
  font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px;
}
.status-pill.parsed  { background: var(--signal-bg); color: var(--signal); }
.status-pill.pending { background: var(--warn-bg); color: var(--warn); }
.status-pill.failed  { background: var(--danger-bg); color: var(--danger); }

/* ── Confidence bar ────────────────────────────────────────────────── */
.conf-row { display: flex; align-items: center; gap: 10px; font-size: 12px; margin-bottom: 8px; }
.conf-label { width: 160px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.conf-bar { flex: 1; height: 5px; background: var(--rule); border-radius: 99px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 99px; background: var(--signal); transition: width .6s; }
.conf-num { width: 34px; text-align: right; font-weight: 500; color: var(--ink); flex-shrink: 0; }

/* ── Tabs ──────────────────────────────────────────────────────────── */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--rule); margin-bottom: 20px; }
.tab-btn {
  padding: 8px 14px; font-size: 13px; border: none; background: transparent;
  color: var(--ink-3); border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all .12s; cursor: pointer;
}
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { color: var(--ink); font-weight: 600; border-bottom-color: var(--ink); }

/* ── JSON viewer ───────────────────────────────────────────────────── */
.json-viewer {
  background: #f4f4f3;
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 14px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.7;
  max-height: 400px;
  overflow-y: auto;
  white-space: pre;
  color: var(--ink-2);
}

/* ── Workflow map ──────────────────────────────────────────────────── */
.workflow-card {
  border: 1px solid var(--rule);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 12px;
}
.workflow-head {
  padding: 13px 18px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  background: var(--white);
  user-select: none;
}
.workflow-head:hover { background: var(--surface); }
.workflow-name { font-weight: 600; font-size: 14px; flex: 1; }
.workflow-meta { font-size: 12px; color: var(--ink-3); }
.workflow-chevron { color: var(--ink-3); transition: transform .2s; }
.workflow-card.open .workflow-chevron { transform: rotate(90deg); }
.workflow-body { padding: 16px 18px; background: var(--surface); border-top: 1px solid var(--rule); display: none; }
.workflow-card.open .workflow-body { display: block; }
.step-list { list-style: none; position: relative; padding-left: 20px; }
.step-list::before { content: ''; position: absolute; left: 6px; top: 8px; bottom: 8px; width: 1px; background: var(--rule); }
.step-item { position: relative; padding: 4px 0 4px 12px; font-size: 13px; color: var(--ink-2); }
.step-item::before { content: ''; position: absolute; left: -2px; top: 10px; width: 8px; height: 8px; border-radius: 50%; background: var(--white); border: 2px solid var(--rule); }
.actor-badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle;
}
.actor-badge.AI { background: var(--accent-bg); color: var(--accent); }
.actor-badge.Human { background: var(--signal-bg); color: var(--signal); }
.actor-badge.AI-Human { background: var(--warn-bg); color: var(--warn); }

/* ── Risk items ────────────────────────────────────────────────────── */
.risk-item {
  padding: 12px 14px; border-radius: 8px; margin-bottom: 8px;
  border-left: 3px solid;
}
.risk-item.critical { border-color: #c0392b; background: #fdf0f0; }
.risk-item.high     { border-color: #e67e22; background: #fef6ee; }
.risk-item.medium   { border-color: #f1c40f; background: #fefdf0; }
.risk-item.low      { border-color: #27ae60; background: #f0fdf4; }
.risk-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.risk-reason { font-size: 12.5px; color: var(--ink-2); }
.risk-rec { font-size: 12px; color: var(--signal); margin-top: 5px; }

/* ── Ask ───────────────────────────────────────────────────────────── */
.ask-box { border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; }
.ask-input-row { display: flex; align-items: flex-end; gap: 0; }
.ask-input-row textarea {
  flex: 1; border: none; padding: 14px 16px; font-size: 14px;
  resize: none; background: var(--white); min-height: 60px;
}
.ask-input-row textarea:focus { outline: none; }
.ask-send { padding: 14px 18px; background: var(--ink); color: var(--white); border: none; font-size: 20px; cursor: pointer; align-self: stretch; }
.ask-send:hover { background: #222; }
.ask-send:disabled { background: var(--ink-3); cursor: not-allowed; }
.ask-history { max-height: 340px; overflow-y: auto; padding: 16px; border-top: 1px solid var(--rule); display: flex; flex-direction: column; gap: 14px; background: var(--surface); }
.qa-item { font-size: 13.5px; }
.qa-q { font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.qa-a { color: var(--ink-2); line-height: 1.6; }
.qa-sources { margin-top: 6px; font-size: 11.5px; color: var(--ink-3); }
.qa-a.ungrounded { color: var(--warn); font-style: italic; }

/* ── Missing info ──────────────────────────────────────────────────── */
.missing-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 9px 12px; background: var(--warn-bg); border-radius: 6px;
  border-left: 3px solid #d4a017; margin-bottom: 6px; font-size: 13px;
}
.missing-icon { flex-shrink: 0; margin-top: 1px; }

/* ── Activity ──────────────────────────────────────────────────────── */
.activity-row {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 9px 0; border-bottom: 1px solid var(--rule); font-size: 13px;
}
.activity-row:last-child { border-bottom: none; }
.activity-time { color: var(--ink-3); font-size: 11.5px; white-space: nowrap; flex-shrink: 0; width: 70px; }
.activity-desc { flex: 1; color: var(--ink-2); }

/* ── Alert / notices ───────────────────────────────────────────────── */
.alert { padding: 11px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
.alert-info    { background: var(--accent-bg); color: var(--accent); }
.alert-success { background: var(--signal-bg); color: var(--signal); }
.alert-warn    { background: var(--warn-bg); color: var(--warn); }
.alert-danger  { background: var(--danger-bg); color: var(--danger); }

/* ── Empty state ───────────────────────────────────────────────────── */
.empty { text-align: center; padding: 40px 20px; color: var(--ink-3); }
.empty-icon { font-size: 32px; margin-bottom: 10px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; }

/* ── Spinner ───────────────────────────────────────────────────────── */
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3); border-top-color: white;
  border-radius: 50%; animation: spin .7s linear infinite;
}
.spinner.dark { border-color: rgba(0,0,0,.1); border-top-color: var(--ink); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Validation ────────────────────────────────────────────────────── */
.val-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--rule); font-size: 13px;
}
.val-row:last-child { border-bottom: none; }
.val-status { flex-shrink: 0; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
.val-status.verified     { background: var(--signal-bg); color: var(--signal); }
.val-status.uncertain    { background: var(--warn-bg); color: var(--warn); }
.val-status.needs_review { background: var(--danger-bg); color: var(--danger); }
.val-content { flex: 1; min-width: 0; }
.val-claim { color: var(--ink); margin-bottom: 3px; }
.val-source { font-size: 11.5px; color: var(--ink-3); }
.val-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ── Modal ─────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--white); border-radius: 12px; padding: 28px;
  width: min(520px, 90vw); max-height: 90vh; overflow-y: auto;
  transform: translateY(12px); transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

/* ── Loading overlay ───────────────────────────────────────────────── */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,.7);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.loading-overlay.show { opacity: 1; pointer-events: auto; }
.loading-msg { margin-top: 14px; font-size: 14px; color: var(--ink-2); }
.loading-spinner { width: 36px; height: 36px; border: 3px solid var(--rule); border-top-color: var(--ink); border-radius: 50%; animation: spin .7s linear infinite; }

/* ── Responsive ────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; width: 100%; height: auto; }
  .main { margin-left: 0; padding: 16px; }
  .card-split { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div class="app">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">Orgni</div>
      <div class="tagline">Organizational Intelligence</div>
    </div>

    <div class="org-switcher">
      <select class="org-select" id="orgSelect" onchange="selectOrg(this.value)">
        <option value="">Select organisation…</option>
      </select>
      <button class="btn-new-org" onclick="openNewOrg()">+ New organisation</button>
    </div>

    <div class="knowledge-badge" id="knowledgeBadge" style="display:none">
      <div class="kb-status">
        <span class="kb-dot empty" id="kbDot"></span>
        <span id="kbStatusText">No knowledge yet</span>
      </div>
      <div id="kbDocCount" style="font-size:11px;margin-top:2px"></div>
    </div>

    <nav class="nav">
      <div class="nav-section">Overview</div>
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <span class="nav-icon">⬡</span> Dashboard
      </div>

      <div class="nav-section">Intake</div>
      <div class="nav-item" onclick="showPage('documents')" id="nav-documents">
        <span class="nav-icon">↑</span> Documents
      </div>
      <div class="nav-item" onclick="showPage('profile')" id="nav-profile">
        <span class="nav-icon">◎</span> Business profile
      </div>

      <div class="nav-section">Intelligence</div>
      <div class="nav-item" onclick="showPage('map')" id="nav-map">
        <span class="nav-icon">⬡</span> Knowledge map
      </div>
      <div class="nav-item" onclick="showPage('workflows')" id="nav-workflows">
        <span class="nav-icon">→</span> Workflows
      </div>
      <div class="nav-item" onclick="showPage('risks')" id="nav-risks">
        <span class="nav-icon">△</span> Risks & gaps
      </div>
      <div class="nav-item" onclick="showPage('validation')" id="nav-validation">
        <span class="nav-icon">✓</span> Validation
      </div>

      <div class="nav-section">Ask & act</div>
      <div class="nav-item" onclick="showPage('ask')" id="nav-ask">
        <span class="nav-icon">?</span> Ask Orgni
      </div>
      <div class="nav-item" onclick="showPage('actions')" id="nav-actions">
        <span class="nav-icon">⚡</span> Actions
      </div>
    </nav>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="mainContent">
    <!-- pages rendered by JS -->
  </main>
</div>

<!-- New org modal -->
<div class="modal-overlay" id="newOrgModal">
  <div class="modal">
    <div class="modal-title">New organisation</div>
    <div class="form-group">
      <label class="form-label">Company name *</label>
      <input class="form-input" id="newOrgName" placeholder="e.g. Rapid Freight Solutions">
    </div>
    <div class="form-group">
      <label class="form-label">Business type *</label>
      <input class="form-input" id="newOrgType" placeholder="e.g. Logistics, Retail, Finance">
    </div>
    <div class="form-group">
      <label class="form-label">Departments</label>
      <div class="tag-input-wrap" id="deptTags" onclick="focusTagInput(this)">
        <input placeholder="Type and press Enter…" onkeydown="addTag(event,'deptTags')">
      </div>
      <div class="form-hint">e.g. Finance, Operations, Admin</div>
    </div>
    <div class="form-group">
      <label class="form-label">Current tools</label>
      <div class="tag-input-wrap" id="toolTags" onclick="focusTagInput(this)">
        <input placeholder="Type and press Enter…" onkeydown="addTag(event,'toolTags')">
      </div>
      <div class="form-hint">e.g. Email, Excel, WhatsApp</div>
    </div>
    <div class="form-group">
      <label class="form-label">Main operational problems</label>
      <div class="tag-input-wrap" id="problemTags" onclick="focusTagInput(this)">
        <input placeholder="Type and press Enter…" onkeydown="addTag(event,'problemTags')">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('newOrgModal')">Cancel</button>
      <button class="btn btn-primary" onclick="createOrg()">Create organisation</button>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-msg" id="loadingMsg">Working…</div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const state = {
  orgs: [],
  currentOrgId: null,
  currentPage: 'dashboard',
  context: null,
  docs: [],
  qaHistory: []
};

// ── API ──────────────────────────────────────────────────────────────────────
const API = '/api';

async function api(method, path, body, isForm) {
  const opts = { method, headers: {} };
  if (body && !isForm) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  if (isForm) opts.body = body;
  const res = await fetch(API + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await loadOrgs();
  renderPage();
}

async function loadOrgs() {
  try {
    const data = await api('GET', '/orgs');
    state.orgs = data.organizations || [];
    renderOrgSelect();
    if (state.orgs.length > 0 && !state.currentOrgId) {
      await selectOrg(state.orgs[0].id, true);
    }
  } catch(e) { showAlert('Could not connect to backend: ' + e.message, 'danger'); }
}

function renderOrgSelect() {
  const sel = document.getElementById('orgSelect');
  sel.innerHTML = '<option value="">Select organisation…</option>' +
    state.orgs.map(o => `<option value="${o.id}" ${o.id===state.currentOrgId?'selected':''}>${o.name}</option>`).join('');
}

async function selectOrg(id, silent) {
  if (!id) return;
  state.currentOrgId = id;
  state.context = null;
  state.docs = [];
  state.qaHistory = [];
  renderOrgSelect();
  try {
    await refreshContext();
    await refreshDocs();
    updateKnowledgeBadge();
    if (!silent) renderPage();
  } catch(e) {}
}

async function refreshContext() {
  if (!state.currentOrgId) return;
  try {
    const data = await api('GET', `/orgs/${state.currentOrgId}/engine/context`);
    state.context = data.context;
  } catch(e) { state.context = null; }
}

async function refreshDocs() {
  if (!state.currentOrgId) return;
  try {
    const data = await api('GET', `/orgs/${state.currentOrgId}/documents`);
    state.docs = data.documents || [];
  } catch(e) { state.docs = []; }
}

function getCurrentOrg() {
  return state.orgs.find(o => o.id === state.currentOrgId);
}

function updateKnowledgeBadge() {
  const badge = document.getElementById('knowledgeBadge');
  const org = getCurrentOrg();
  if (!org) { badge.style.display = 'none'; return; }
  badge.style.display = 'block';
  const dot = document.getElementById('kbDot');
  const txt = document.getElementById('kbStatusText');
  const cnt = document.getElementById('kbDocCount');
  const ks = org.knowledgeStatus || 'empty';
  dot.className = `kb-dot ${ks}`;
  txt.textContent = ks === 'ready' ? 'Knowledge ready' : ks === 'partial' ? 'Building knowledge' : 'No knowledge yet';
  cnt.textContent = `${state.docs.length} document${state.docs.length!==1?'s':''}`;
}

// ── Navigation ───────────────────────────────────────────────────────────────
function showPage(page) {
  state.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById(`nav-${page}`);
  if (nav) nav.classList.add('active');
  renderPage();
}

function renderPage() {
  const el = document.getElementById('mainContent');
  if (!state.currentOrgId) { el.innerHTML = renderWelcome(); return; }
  const pages = {
    dashboard: renderDashboard,
    documents:  renderDocuments,
    profile:    renderProfile,
    map:        renderMap,
    workflows:  renderWorkflows,
    risks:      renderRisks,
    validation: renderValidation,
    ask:        renderAsk,
    actions:    renderActions
  };
  el.innerHTML = (pages[state.currentPage] || renderDashboard)();
  afterRender();
}

// ── Pages ────────────────────────────────────────────────────────────────────

function renderWelcome() {
  return `
  <div style="max-width:480px;margin:80px auto;text-align:center">
    <div style="font-size:40px;margin-bottom:20px">⬡</div>
    <h1 style="font-size:24px;font-weight:700;margin-bottom:10px">Welcome to Orgni</h1>
    <p style="color:var(--ink-3);font-size:15px;line-height:1.6;margin-bottom:28px">
      Create an organisation to start building your operational intelligence map.
    </p>
    <button class="btn btn-primary" onclick="openNewOrg()">Create your first organisation</button>
  </div>`;
}

function renderDashboard() {
  const org = getCurrentOrg();
  const ctx = state.context;
  const docs = state.docs;
  const parsed = docs.filter(d => d.status === 'parsed').length;

  return `
  <div class="page-header">
    <div class="page-title">${org.name}</div>
    <div class="page-sub">${org.businessType} · ${org.knowledgeStatus === 'ready' ? 'Intelligence ready' : org.knowledgeStatus === 'partial' ? 'Knowledge building' : 'Awaiting intake'}</div>
  </div>

  ${!ctx ? `
  <div class="alert alert-info">
    Upload documents and run <strong>intelligence intake</strong> to generate your business knowledge map.
  </div>` : ''}

  <div class="stat-grid" style="margin-bottom:20px">
    <div class="stat-box"><div class="stat-num">${(ctx?.workflows||[]).length || 0}</div><div class="stat-label">Workflows</div></div>
    <div class="stat-box"><div class="stat-num">${(ctx?.roles||[]).length || 0}</div><div class="stat-label">Roles</div></div>
    <div class="stat-box"><div class="stat-num">${(ctx?.rules||[]).length || 0}</div><div class="stat-label">Rules</div></div>
    <div class="stat-box"><div class="stat-num">${(ctx?.risks||[]).length || 0}</div><div class="stat-label">Risks</div></div>
    <div class="stat-box"><div class="stat-num">${parsed}</div><div class="stat-label">Documents</div></div>
    <div class="stat-box"><div class="stat-num">${ctx ? Math.round((ctx.confidence||0)*100) + '%' : '—'}</div><div class="stat-label">Confidence</div></div>
  </div>

  <div class="card-split">
    <div class="card">
      <div class="card-title">Knowledge intake</div>
      ${docs.length === 0 ? `<p style="font-size:13px;color:var(--ink-3);margin-bottom:14px">No documents uploaded yet.</p>` : `<p style="font-size:13px;color:var(--ink-2);margin-bottom:14px">${parsed} of ${docs.length} documents parsed.</p>`}
      <div class="btn-row">
        <button class="btn btn-secondary btn-sm" onclick="showPage('documents')">Upload documents</button>
        <button class="btn btn-primary btn-sm" onclick="runIntake()" ${docs.length===0?'disabled':''}>Run intake</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Missing information</div>
      ${ctx?.missingInformation?.length ? ctx.missingInformation.slice(0,3).map(m =>
        `<div class="missing-item"><span class="missing-icon">?</span>${m}</div>`
      ).join('') : `<p style="font-size:13px;color:var(--ink-3)">No gaps detected yet.</p>`}
    </div>
  </div>

  <div class="card-split">
    <div class="card">
      <div class="card-title">Recommended next steps</div>
      ${ctx?.recommendedNextSteps?.length ? ctx.recommendedNextSteps.map((s,i) =>
        `<div style="display:flex;gap:8px;margin-bottom:8px;font-size:13px"><span style="color:var(--ink-3);flex-shrink:0">${i+1}.</span><span>${s}</span></div>`
      ).join('') : `<p style="font-size:13px;color:var(--ink-3)">Run intake to get recommendations.</p>`}
    </div>

    <div class="card">
      <div class="card-title">Ask Orgni</div>
      <p style="font-size:13px;color:var(--ink-2);margin-bottom:12px">Ask a question grounded in your business documents.</p>
      <button class="btn btn-secondary btn-sm" onclick="showPage('ask')">Open Ask Orgni →</button>
    </div>
  </div>`;
}

function renderDocuments() {
  const docs = state.docs;
  return `
  <div class="page-header">
    <div class="page-title">Documents</div>
    <div class="page-sub">Upload SOPs, policies, invoices, workflow notes, role descriptions — anything that describes how your business operates.</div>
  </div>

  <div class="card">
    <div class="upload-zone" id="uploadZone" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
      <input type="file" multiple accept=".txt,.md,.csv,.json" onchange="uploadFiles(this.files)" id="fileInput">
      <div class="upload-icon">↑</div>
      <div class="upload-label">Drop files here or click to browse</div>
      <div class="upload-sub">Supports .txt .md .csv .json · Up to 10MB each</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Uploaded documents (${docs.length})</span>
      ${docs.length > 0 ? `<button class="btn btn-primary btn-sm" onclick="runIntake()">Run intelligence intake</button>` : ''}
    </div>
    ${docs.length === 0
      ? `<div class="empty"><div class="empty-icon">↑</div><div class="empty-title">No documents yet</div><div class="empty-sub">Upload your first document above to begin.</div></div>`
      : `<div class="doc-list">${docs.map(d => `
        <div class="doc-row">
          <span class="doc-icon">${docIcon(d.fileType)}</span>
          <div class="doc-info">
            <div class="doc-name">${d.name}</div>
            <div class="doc-meta">${formatSize(d.fileSize)} · ${d.wordCount ? d.wordCount.toLocaleString() + ' words' : 'parsing…'} · ${timeAgo(d.uploadedAt)}</div>
          </div>
          <span class="status-pill ${d.status}">${d.status}</span>
          <button class="btn btn-ghost btn-sm" onclick="deleteDoc('${d.id}')">✕</button>
        </div>`).join('')}
      </div>`
    }
  </div>`;
}

function renderProfile() {
  const org = getCurrentOrg();
  return `
  <div class="page-header">
    <div class="page-title">Business profile</div>
    <div class="page-sub">Describe how your business operates. This feeds the knowledge extraction alongside your documents.</div>
  </div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">Company name</label>
      <input class="form-input" id="profName" value="${esc(org.name)}">
    </div>
    <div class="form-group">
      <label class="form-label">Business type</label>
      <input class="form-input" id="profType" value="${esc(org.businessType)}">
    </div>
    <div class="form-group">
      <label class="form-label">Departments</label>
      <div class="tag-input-wrap" id="profDepts" onclick="focusTagInput(this)">
        ${(org.departments||[]).map(t => tagHtml(t)).join('')}
        <input placeholder="Type and press Enter…" onkeydown="addTag(event,'profDepts')">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Key workflows</label>
      <div class="tag-input-wrap" id="profWorkflows" onclick="focusTagInput(this)">
        ${(org.keyWorkflows||[]).map(t => tagHtml(t)).join('')}
        <input placeholder="e.g. Invoice Approval" onkeydown="addTag(event,'profWorkflows')">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Current tools</label>
      <div class="tag-input-wrap" id="profTools" onclick="focusTagInput(this)">
        ${(org.currentTools||[]).map(t => tagHtml(t)).join('')}
        <input placeholder="e.g. Email, Excel" onkeydown="addTag(event,'profTools')">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Main operational problems</label>
      <div class="tag-input-wrap" id="profProblems" onclick="focusTagInput(this)">
        ${(org.mainProblems||[]).map(t => tagHtml(t)).join('')}
        <input placeholder="e.g. Manual invoicing" onkeydown="addTag(event,'profProblems')">
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveProfile()">Save profile</button>
  </div>`;
}

function renderMap() {
  const ctx = state.context;
  if (!ctx) return noContextMsg();

  const summary = ctx.summary;
  return `
  <div class="page-header">
    <div class="page-title">Knowledge map</div>
    <div class="page-sub">Version ${ctx.version} · Confidence ${Math.round((ctx.confidence||0)*100)}% · ${ctx.sourceDocuments?.length || 0} source documents</div>
  </div>

  ${summary?.plain_english_summary ? `
  <div class="card" style="border-left:4px solid var(--ink)">
    <div class="card-title">Business summary</div>
    <p style="font-size:14px;line-height:1.7;color:var(--ink-2)">${summary.plain_english_summary}</p>
  </div>` : ''}

  <div class="card-split">
    <div class="card">
      <div class="card-title">Departments (${(ctx.departments||[]).length})</div>
      ${(ctx.departments||[]).length ? ctx.departments.map(d =>
        `<div style="font-size:13px;padding:5px 0;border-bottom:1px solid var(--rule);color:var(--ink-2)">
          <strong>${d.name || d}</strong>${d.functions?.length ? `<div style="font-size:11.5px;color:var(--ink-3);margin-top:2px">${d.functions.join(', ')}</div>` : ''}
        </div>`
      ).join('') : '<p style="font-size:13px;color:var(--ink-3)">None detected</p>'}
    </div>
    <div class="card">
      <div class="card-title">Systems in use</div>
      ${(summary?.systems_in_use||[]).length ? summary.systems_in_use.map(s =>
        `<span style="display:inline-block;background:var(--surface);border:1px solid var(--rule);border-radius:4px;padding:3px 9px;font-size:12px;margin:3px">${s}</span>`
      ).join('') : '<p style="font-size:13px;color:var(--ink-3)">None detected</p>'}
    </div>
  </div>

  <div class="card">
    <div class="card-title">Confidence by extraction</div>
    ${[
      ['Workflows', ctx.workflows?.length, .88],
      ['Roles', ctx.roles?.length, .86],
      ['Rules', ctx.rules?.length, .91],
      ['Risks', ctx.risks?.length, .84],
      ['AI opportunities', ctx.aiOpportunities?.length, .80]
    ].map(([label, count, conf]) => `
      <div class="conf-row">
        <span class="conf-label">${label} (${count||0})</span>
        <div class="conf-bar"><div class="conf-fill" style="width:${Math.round((ctx.confidence||conf)*100)}%"></div></div>
        <span class="conf-num">${Math.round((ctx.confidence||conf)*100)}%</span>
      </div>`
    ).join('')}
  </div>

  <div class="card">
    <div class="card-title">Raw knowledge map</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchJsonTab(this,'mapSummary')">Summary</button>
      <button class="tab-btn" onclick="switchJsonTab(this,'mapRoles')">Roles</button>
      <button class="tab-btn" onclick="switchJsonTab(this,'mapRules')">Rules</button>
    </div>
    <div id="mapJsonViewer" class="json-viewer">${JSON.stringify(ctx.summary, null, 2)}</div>
    <div id="mapSummary" data-json='${JSON.stringify(ctx.summary)}' style="display:none"></div>
    <div id="mapRoles" data-json='${JSON.stringify(ctx.roles)}' style="display:none"></div>
    <div id="mapRules" data-json='${JSON.stringify(ctx.rules)}' style="display:none"></div>
  </div>`;
}

function renderWorkflows() {
  const ctx = state.context;
  if (!ctx) return noContextMsg();
  const workflows = ctx.workflows || [];
  return `
  <div class="page-header">
    <div class="page-title">Workflows</div>
    <div class="page-sub">${workflows.length} workflow${workflows.length!==1?'s':''} detected</div>
  </div>
  ${!workflows.length ? `<div class="empty"><div class="empty-icon">→</div><div class="empty-title">No workflows detected</div><div class="empty-sub">Upload process documents or SOPs to detect workflows.</div></div>` : ''}
  ${workflows.map((wf, i) => `
    <div class="workflow-card" id="wf${i}">
      <div class="workflow-head" onclick="toggleWorkflow('wf${i}')">
        <div>
          <div class="workflow-name">${wf.workflow_name || 'Unnamed workflow'}</div>
          <div class="workflow-meta">Trigger: ${wf.trigger || '—'} · Owner: ${wf.owner || '—'}</div>
        </div>
        <span class="workflow-chevron">›</span>
      </div>
      <div class="workflow-body">
        ${wf.steps?.length ? `
          <div class="card-title" style="margin-bottom:10px">Steps</div>
          <ul class="step-list">
            ${wf.steps.map(s => `<li class="step-item">${s}</li>`).join('')}
          </ul>` : ''}
        ${wf.approval_points?.length ? `
          <div style="margin-top:14px">
            <div class="card-title" style="margin-bottom:8px">Approval points</div>
            ${wf.approval_points.map(a => `<div style="font-size:13px;color:var(--ink-2);padding:3px 0">· ${a}</div>`).join('')}
          </div>` : ''}
        ${wf.bottlenecks?.length ? `
          <div style="margin-top:14px">
            <div class="card-title" style="margin-bottom:8px">Bottlenecks</div>
            ${wf.bottlenecks.map(b => `<div class="risk-item medium"><div class="risk-title">${b.bottleneck||b}</div>${b.recommendation?`<div class="risk-rec">→ ${b.recommendation}</div>`:''}</div>`).join('')}
          </div>` : ''}
        ${ctx.blueprint?.blueprints?.find(b => b.workflow_name === wf.workflow_name) ? (() => {
          const bp = ctx.blueprint.blueprints.find(b => b.workflow_name === wf.workflow_name);
          return `<div style="margin-top:14px">
            <div class="card-title" style="margin-bottom:10px">AI execution blueprint</div>
            <ul class="step-list">
              ${(bp.steps||[]).map(s =>
                `<li class="step-item">${s.step} <span class="actor-badge ${(s.actor||'').replace('+','-')}">${s.actor||''}</span></li>`
              ).join('')}
            </ul>
            ${bp.ai_boundaries?.length ? `<div style="margin-top:10px;font-size:12px;color:var(--danger)">
              ${bp.ai_boundaries.map(b => `<div>⚠ ${b}</div>`).join('')}
            </div>` : ''}
          </div>`;
        })() : ''}
      </div>
    </div>`
  ).join('')}`;
}

function renderRisks() {
  const ctx = state.context;
  if (!ctx) return noContextMsg();
  const risks = ctx.risks || [];
  const gaps  = ctx.gaps  || [];
  const score = Math.round((ctx.riskScore||0)*100);
  return `
  <div class="page-header">
    <div class="page-title">Risks & gaps</div>
    <div class="page-sub">Overall risk score: ${score}/100 · ${risks.length} risk${risks.length!==1?'s':''} · ${gaps.length} gap${gaps.length!==1?'s':''}</div>
  </div>

  ${risks.length ? `
  <div class="card">
    <div class="card-title">Operational risks</div>
    ${risks.map(r => `
      <div class="risk-item ${r.severity||'medium'}">
        <div class="risk-title">${r.risk}</div>
        <div class="risk-reason">${r.reason}</div>
        ${r.recommendation ? `<div class="risk-rec">→ ${r.recommendation}</div>` : ''}
      </div>`).join('')}
  </div>` : ''}

  ${gaps.length ? `
  <div class="card">
    <div class="card-title">Process gaps</div>
    ${gaps.map(g => `
      <div class="missing-item">
        <span class="missing-icon">△</span>
        <div>
          <div style="font-size:13px;font-weight:500;margin-bottom:2px">${g.gap}</div>
          <div style="font-size:12px;color:var(--ink-3)">Type: ${g.type} · Affects: ${g.affected_workflow||'general'}</div>
          ${g.recommendation ? `<div style="font-size:12px;color:var(--signal);margin-top:4px">→ ${g.recommendation}</div>` : ''}
        </div>
      </div>`).join('')}
  </div>` : ''}

  ${(!risks.length && !gaps.length) ? `<div class="empty"><div class="empty-icon">△</div><div class="empty-title">No risks detected</div><div class="empty-sub">Run intelligence intake to analyse risks.</div></div>` : ''}`;
}

function renderValidation() {
  return `
  <div class="page-header">
    <div class="page-title">Validation</div>
    <div class="page-sub">Every extracted finding is scored and traced to its source. Review uncertain findings here.</div>
  </div>
  <div id="validationContent"><div class="empty"><div class="loading-spinner dark" style="margin:0 auto"></div></div></div>`;
}

function renderAsk() {
  const qaHtml = state.qaHistory.map(qa => `
    <div class="qa-item">
      <div class="qa-q">${esc(qa.question)}</div>
      <div class="qa-a ${qa.grounded?'':'ungrounded'}">${qa.answer}</div>
      ${qa.sources?.length ? `<div class="qa-sources">Sources: ${qa.sources.map(s=>s.documentName).join(', ')}</div>` : ''}
    </div>`).join('');

  return `
  <div class="page-header">
    <div class="page-title">Ask Orgni</div>
    <div class="page-sub">Ask questions grounded in your business documents. Orgni will not guess.</div>
  </div>
  <div class="ask-box">
    ${state.qaHistory.length ? `<div class="ask-history" id="askHistory">${qaHtml}</div>` : ''}
    <div class="ask-input-row">
      <textarea id="askInput" placeholder="e.g. Who approves payments above R50,000? What happens when a delivery record is missing?" rows="3" onkeydown="handleAskKey(event)"></textarea>
      <button class="ask-send" onclick="sendQuestion()" id="askBtn">›</button>
    </div>
  </div>`;
}

function renderActions() {
  const actions = [
    { type: 'task_list', icon: '✓', label: 'Task list', desc: 'Prioritised actions for the business right now' },
    { type: 'workflow_summary', icon: '→', label: 'Workflow summary', desc: 'Plain-English summary of how work flows' },
    { type: 'flag_missing', icon: '△', label: 'Flag missing', desc: 'Documents and processes that appear to be missing' },
    { type: 'next_step', icon: '⚡', label: 'Next step', desc: 'The single most important thing to do now' },
    { type: 'draft_message', icon: '✉', label: 'Draft update', desc: 'Internal team update on operational status' }
  ];
  return `
  <div class="page-header">
    <div class="page-title">Actions</div>
    <div class="page-sub">Generate specific outputs from your business knowledge.</div>
  </div>
  <div id="actionResult"></div>
  <div class="card-split">
    ${actions.map(a => `
      <div class="card" style="cursor:pointer;transition:box-shadow .15s" onclick="runAction('${a.type}')" onmouseenter="this.style.boxShadow='0 2px 12px rgba(0,0,0,.08)'" onmouseleave="this.style.boxShadow=''">
        <div style="font-size:22px;margin-bottom:8px">${a.icon}</div>
        <div style="font-weight:600;font-size:14px;margin-bottom:4px">${a.label}</div>
        <div style="font-size:12.5px;color:var(--ink-3)">${a.desc}</div>
      </div>`).join('')}
  </div>`;
}

// ── After render ─────────────────────────────────────────────────────────────
async function afterRender() {
  if (state.currentPage === 'validation') loadValidation();
}

async function loadValidation() {
  if (!state.currentOrgId) return;
  try {
    const data = await api('GET', `/orgs/${state.currentOrgId}/engine/validation`);
    const el = document.getElementById('validationContent');
    if (!el) return;
    const stats = data.stats || {};
    const needs = data.needsReview || [];

    el.innerHTML = `
      <div class="card">
        <div class="card-title">Validation summary</div>
        <div class="stat-grid" style="margin-bottom:0">
          <div class="stat-box"><div class="stat-num">${stats.verified||0}</div><div class="stat-label">Verified</div></div>
          <div class="stat-box"><div class="stat-num">${stats.uncertain||0}</div><div class="stat-label">Uncertain</div></div>
          <div class="stat-box"><div class="stat-num">${stats.needsReview||0}</div><div class="stat-label">Needs review</div></div>
          <div class="stat-box"><div class="stat-num">${Math.round((stats.averageConfidence||0)*100)}%</div><div class="stat-label">Avg confidence</div></div>
        </div>
      </div>
      ${needs.length ? `
      <div class="card">
        <div class="card-title">Needs review (${needs.length})</div>
        ${needs.map(v => `
          <div class="val-row">
            <span class="val-status ${v.status}">${v.status.replace('_',' ')}</span>
            <div class="val-content">
              <div class="val-claim">${v.claim}</div>
              ${v.sourceExcerpt ? `<div class="val-source">"${v.sourceExcerpt.slice(0,120)}…"</div>` : ''}
            </div>
            <div class="val-actions">
              <button class="btn btn-sm btn-secondary" onclick="confirmFinding('${v.id}')">Confirm</button>
              <button class="btn btn-sm btn-danger" onclick="rejectFinding('${v.id}')">Reject</button>
            </div>
          </div>`).join('')}
      </div>` : ''}`;
  } catch(e) {}
}

// ── Actions ──────────────────────────────────────────────────────────────────
async function createOrg() {
  const name = document.getElementById('newOrgName').value.trim();
  const businessType = document.getElementById('newOrgType').value.trim();
  if (!name || !businessType) return showAlert('Company name and business type are required.', 'warn');

  try {
    showLoading('Creating organisation…');
    const data = await api('POST', '/orgs', {
      name, businessType,
      departments: getTagValues('deptTags'),
      currentTools: getTagValues('toolTags'),
      mainProblems: getTagValues('problemTags')
    });
    state.orgs.push(data.organization);
    state.currentOrgId = data.organization.id;
    closeModal('newOrgModal');
    await refreshDocs();
    updateKnowledgeBadge();
    renderOrgSelect();
    showPage('dashboard');
  } catch(e) { showAlert(e.message, 'danger'); }
  finally { hideLoading(); }
}

async function saveProfile() {
  const org = getCurrentOrg();
  try {
    showLoading('Saving profile…');
    const updated = await api('PATCH', `/orgs/${org.id}`, {
      name: document.getElementById('profName').value.trim(),
      businessType: document.getElementById('profType').value.trim(),
      departments: getTagValues('profDepts'),
      keyWorkflows: getTagValues('profWorkflows'),
      currentTools: getTagValues('profTools'),
      mainProblems: getTagValues('profProblems')
    });
    const idx = state.orgs.findIndex(o => o.id === org.id);
    if (idx >= 0) state.orgs[idx] = updated.organization;
    showAlert('Profile saved.', 'success');
  } catch(e) { showAlert(e.message, 'danger'); }
  finally { hideLoading(); }
}

async function uploadFiles(files) {
  if (!files?.length) return;
  const form = new FormData();
  for (const f of files) form.append('files', f);
  try {
    showLoading(`Uploading ${files.length} file${files.length>1?'s':''}…`);
    await api('POST', `/orgs/${state.currentOrgId}/documents`, form, true);
    await refreshDocs();
    updateKnowledgeBadge();
    renderPage();
    showAlert(`${files.length} file${files.length>1?'s':''} uploaded. Parsing in progress.`, 'success');
  } catch(e) { showAlert(e.message, 'danger'); }
  finally { hideLoading(); document.getElementById('fileInput') && (document.getElementById('fileInput').value=''); }
}

async function deleteDoc(docId) {
  if (!confirm('Delete this document?')) return;
  try {
    await api('DELETE', `/orgs/${state.currentOrgId}/documents/${docId}`);
    await refreshDocs();
    renderPage();
  } catch(e) { showAlert(e.message, 'danger'); }
}

async function runIntake() {
  if (!state.currentOrgId) return;
  try {
    showLoading('Running intelligence intake… This may take 30–60 seconds.');
    await api('POST', `/orgs/${state.currentOrgId}/engine/intake`);
    await refreshContext();
    const org = getCurrentOrg();
    if (org) { org.knowledgeStatus = 'ready'; updateKnowledgeBadge(); }
    showPage('dashboard');
    showAlert('Intelligence intake complete. Your knowledge map is ready.', 'success');
  } catch(e) { showAlert('Intake failed: ' + e.message, 'danger'); }
  finally { hideLoading(); }
}

async function sendQuestion() {
  const input = document.getElementById('askInput');
  const q = input?.value?.trim();
  if (!q || q.length < 5) return;
  input.disabled = true;
  document.getElementById('askBtn').disabled = true;
  try {
    const data = await api('POST', `/orgs/${state.currentOrgId}/engine/ask`, { question: q });
    state.qaHistory.push(data);
    input.value = '';
    renderPage();
    setTimeout(() => {
      const h = document.getElementById('askHistory');
      if (h) h.scrollTop = h.scrollHeight;
    }, 50);
  } catch(e) {
    showAlert('Could not get answer: ' + e.message, 'danger');
    if (input) { input.disabled = false; document.getElementById('askBtn').disabled = false; }
  }
}

function handleAskKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
}

async function runAction(type) {
  const el = document.getElementById('actionResult');
  if (el) el.innerHTML = `<div class="card"><div class="loading-spinner dark" style="margin:0 auto 8px"></div><div style="text-align:center;font-size:13px;color:var(--ink-3)">Generating ${type.replace('_',' ')}…</div></div>`;
  try {
    const data = await api('POST', `/orgs/${state.currentOrgId}/engine/actions`, { type });
    if (el) el.innerHTML = `<div class="card"><div class="card-title">${type.replace('_',' ')}</div><div style="font-size:13.5px;line-height:1.7;color:var(--ink-2);white-space:pre-wrap">${esc(data.result)}</div></div>`;
  } catch(e) { if (el) el.innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
}

async function confirmFinding(id) {
  try {
    await api('POST', `/orgs/${state.currentOrgId}/engine/validation/${id}/confirm`, { reviewedBy: 'user' });
    loadValidation();
  } catch(e) { showAlert(e.message, 'danger'); }
}

async function rejectFinding(id) {
  try {
    await api('POST', `/orgs/${state.currentOrgId}/engine/validation/${id}/reject`, { reviewedBy: 'user', reason: 'Rejected by user' });
    loadValidation();
  } catch(e) { showAlert(e.message, 'danger'); }
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function noContextMsg() {
  return `
  <div class="empty">
    <div class="empty-icon">⬡</div>
    <div class="empty-title">No knowledge map yet</div>
    <div class="empty-sub">Upload documents and run <strong>intelligence intake</strong> to generate your business map.</div>
    <div style="margin-top:16px">
      <button class="btn btn-secondary" onclick="showPage('documents')" style="margin-right:8px">Upload documents</button>
      <button class="btn btn-primary" onclick="runIntake()" ${state.docs.length===0?'disabled':''}>Run intake</button>
    </div>
  </div>`;
}

function switchJsonTab(btn, id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById(id);
  const viewer = document.getElementById('mapJsonViewer');
  if (el && viewer) viewer.textContent = JSON.stringify(JSON.parse(el.dataset.json||'null'), null, 2);
}

function toggleWorkflow(id) {
  const el = document.getElementById(id);
  el?.classList.toggle('open');
}

function openNewOrg() {
  document.getElementById('newOrgModal').classList.add('open');
  setTimeout(() => document.getElementById('newOrgName')?.focus(), 50);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || 'Working…';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

let alertTimer;
function showAlert(msg, type = 'info') {
  let el = document.getElementById('globalAlert');
  if (!el) {
    el = document.createElement('div');
    el.id = 'globalAlert';
    el.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:300;max-width:360px;font-size:13px;border-radius:8px;padding:12px 16px;box-shadow:0 4px 16px rgba(0,0,0,.12);transition:opacity .3s';
    document.body.appendChild(el);
  }
  const colors = { info: '#eaeefd:#1a3a6b', success: '#eaf4ee:#1a6b3c', warn: '#fef6e4:#7a4a00', danger: '#fdeaea:#8b1a1a' };
  const [bg, color] = (colors[type]||colors.info).split(':');
  el.style.background = bg; el.style.color = color; el.style.opacity = '1';
  el.textContent = msg;
  clearTimeout(alertTimer);
  alertTimer = setTimeout(() => { el.style.opacity = '0'; }, 4000);
}

// Tag inputs
function addTag(e, wrapperId) {
  if (e.key !== 'Enter' && e.key !== ',') return;
  e.preventDefault();
  const val = e.target.value.trim().replace(/,$/, '');
  if (!val) return;
  e.target.value = '';
  const wrap = document.getElementById(wrapperId);
  const tag = document.createElement('span');
  tag.className = 'tag';
  tag.dataset.val = val;
  tag.innerHTML = `${esc(val)}<button class="tag-remove" onclick="this.parentElement.remove()">×</button>`;
  wrap.insertBefore(tag, e.target);
}

function focusTagInput(wrap) {
  wrap.querySelector('input')?.focus();
}

function tagHtml(val) {
  return `<span class="tag" data-val="${esc(val)}">${esc(val)}<button class="tag-remove" onclick="this.parentElement.remove()">×</button></span>`;
}

function getTagValues(wrapperId) {
  return [...(document.getElementById(wrapperId)?.querySelectorAll('.tag')||[])].map(t => t.dataset.val).filter(Boolean);
}

// Drop zone
function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function handleDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); uploadFiles(e.dataTransfer.files); }

// Format helpers
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatSize(b) { return b > 1048576 ? (b/1048576).toFixed(1)+'MB' : Math.round(b/1024)+'KB'; }
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60)+'m ago';
  if (s < 86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function docIcon(ext) {
  return {'.pdf':'📄','.docx':'📝','.csv':'📊','.json':'{ }','.txt':'📋','.md':'#'}[ext] || '📄';
}

// Auto-refresh docs status while parsing
setInterval(async () => {
  if (!state.currentOrgId) return;
  const hasPending = state.docs.some(d => d.status === 'pending');
  if (hasPending) {
    await refreshDocs();
    updateKnowledgeBadge();
    if (state.currentPage === 'documents') renderPage();
  }
}, 4000);

// Start
init();
</script>
